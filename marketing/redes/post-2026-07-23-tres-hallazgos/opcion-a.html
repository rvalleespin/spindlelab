<!DOCTYPE html><html><head><meta charset="utf-8"><style>
@font-face { font-family:'Gabarito'; src:url('Gabarito.woff2') format('woff2'); }
@font-face { font-family:'Inter'; src:url('inter.woff2') format('woff2'); font-weight:100 900; }
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1080px; height:1080px; overflow:hidden; font-family:'Inter',sans-serif; }
.post { width:1080px; height:1080px; background:#F7F5F0; color:#131A22; padding:82px; position:relative; display:flex; flex-direction:column; }
.eyebrow { font-size:21px; font-weight:700; letter-spacing:3.5px; text-transform:uppercase; color:#8A93A0; }
.h { font-family:'Gabarito'; font-weight:600; font-size:78px; line-height:1.1; letter-spacing:-1.6px; margin-top:30px; }
.rows { margin-top:64px; }
.row { display:grid; grid-template-columns:64px 1fr auto; align-items:baseline; column-gap:20px;
       border-top:1px solid #DCD8CE; padding:30px 0 26px; }
.row:last-child { border-bottom:1px solid #DCD8CE; }
.n { font-family:'Gabarito'; font-weight:600; font-size:26px; color:#8A93A0; letter-spacing:1px; }
.t { font-family:'Gabarito'; font-weight:600; font-size:38px; line-height:1.25; letter-spacing:-0.5px; }
.v { font-family:ui-monospace,'SF Mono',Menlo,monospace; font-size:24px; color:#5D6673; white-space:nowrap; }
.foot { position:absolute; bottom:82px; left:82px; right:82px; display:flex; align-items:flex-end; justify-content:space-between; }
.wm { font-family:'Gabarito'; font-weight:600; font-size:42px; }
.pt { color:#C9A227; }
.cta { font-size:23px; color:#5D6673; text-align:right; }
</style></head><body>
<div class="post">
  <div class="eyebrow">Auditorías de visibilidad en IA</div>
  <div class="h">Tres cosas que encontramos<br>casi siempre.</div>
  <div class="rows">
    <div class="row">
      <div class="n">01</div>
      <div class="t">Bloquea a los lectores automáticos</div>
      <div class="v">HTTP 403</div>
    </div>
    <div class="row">
      <div class="n">02</div>
      <div class="t">No dice quién es la empresa</div>
      <div class="v">JSON-LD: 0</div>
    </div>
    <div class="row">
      <div class="n">03</div>
      <div class="t">La descripción está vacía</div>
      <div class="v">&lt;meta description&gt; —</div>
    </div>
  </div>
  <div class="foot">
    <div class="wm">SpindleLab<span class="pt">.</span></div>
    <div class="cta">Mini-diagnóstico gratis · spindlelab.cl</div>
  </div>
</div>
</body></html>
