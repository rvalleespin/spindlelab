<!DOCTYPE html><html><head><meta charset="utf-8"><style>
@font-face { font-family:'Gabarito'; src:url('Gabarito.woff2') format('woff2'); }
@font-face { font-family:'Inter'; src:url('inter.woff2') format('woff2'); font-weight:100 900; }
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1080px; height:1080px; overflow:hidden; font-family:'Inter',sans-serif; }
.post { width:1080px; height:1080px; position:relative; overflow:hidden; color:#F7F5F0; }
.ph { position:absolute; inset:0; width:1080px; height:1080px; object-fit:cover; object-position:72% 50%; }
.veil { position:absolute; inset:0; background:linear-gradient(115deg, rgba(19,26,34,0.93) 0%, rgba(19,26,34,0.80) 42%, rgba(19,26,34,0.24) 100%); }
.in { position:absolute; inset:0; padding:82px; display:flex; flex-direction:column; }
.eyebrow { font-size:21px; font-weight:700; letter-spacing:3.5px; text-transform:uppercase; color:#8A93A0; }
.h { font-family:'Gabarito'; font-weight:600; font-size:74px; line-height:1.1; letter-spacing:-1.6px; margin-top:30px; }
.rows { margin-top:62px; max-width:820px; }
.row { display:grid; grid-template-columns:60px 1fr; align-items:baseline; column-gap:18px;
       border-top:1px solid rgba(247,245,240,0.18); padding:26px 0 22px; }
.row:last-child { border-bottom:1px solid rgba(247,245,240,0.18); }
.n { font-family:'Gabarito'; font-weight:600; font-size:24px; color:#8A93A0; letter-spacing:1px; }
.t { font-family:'Gabarito'; font-weight:600; font-size:36px; line-height:1.25; letter-spacing:-0.5px; }
.v { font-family:ui-monospace,'SF Mono',Menlo,monospace; font-size:22px; color:#8A93A0; margin-top:8px; }
.foot { position:absolute; bottom:82px; left:82px; right:82px; display:flex; align-items:flex-end; justify-content:space-between; }
.wm { font-family:'Gabarito'; font-weight:600; font-size:42px; }
.pt { color:#C9A227; }
.cta { font-size:23px; color:#8A93A0; text-align:right; }
</style></head><body>
<div class="post">
  <img class="ph" src="foto.png">
  <div class="veil"></div>
  <div class="in">
    <div class="eyebrow">Auditorías de visibilidad en IA</div>
    <div class="h">Tres cosas que encontramos<br>casi siempre.</div>
    <div class="rows">
      <div class="row">
        <div class="n">01</div>
        <div><div class="t">Bloquea a los lectores automáticos</div><div class="v">HTTP 403</div></div>
      </div>
      <div class="row">
        <div class="n">02</div>
        <div><div class="t">No dice quién es la empresa</div><div class="v">JSON-LD: 0</div></div>
      </div>
      <div class="row">
        <div class="n">03</div>
        <div><div class="t">La descripción está vacía</div><div class="v">&lt;meta description&gt; —</div></div>
      </div>
    </div>
  </div>
  <div class="foot">
    <div class="wm">SpindleLab<span class="pt">.</span></div>
    <div class="cta">Mini-diagnóstico gratis · spindlelab.cl</div>
  </div>
</div>
</body></html>
