<!DOCTYPE html><html><head><meta charset="utf-8"><style>
@font-face { font-family:'Gabarito'; src:url('Gabarito.woff2') format('woff2'); }
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1080px; height:1920px; background:transparent; overflow:hidden; }
.f { width:1080px; height:1920px; padding:110px; display:flex; flex-direction:column; justify-content:flex-end; padding-bottom:440px; }

.sub { font-family:'Gabarito'; font-weight:500; color:#F2ECDD; margin-top:34px;

.wmrow { display:flex; align-items:baseline; gap:26px; margin-top:60px; }
.wm { font-family:'Gabarito'; font-weight:600; font-size:56px; color:#F7F5F0;
  text-shadow:0 2px 6px rgba(0,0,0,0.85); }
.pt { color:#C9A227; }
.dom { font-family:'Gabarito'; font-weight:500; font-size:32px; color:#E7E1D2;
  text-shadow:0 2px 6px rgba(0,0,0,0.85); }
</style></head><body>
<div class="f">
  <div class="big" style="font-size:104px; line-height:1.08;">¿Aparece el tuyo?</div>
  <div class="sub" style="font-size:58px; line-height:1.28;">Lo revisamos gratis, en 48 horas.</div>
  <div class="wmrow">
    <div class="wm">SpindleLab<span class="pt">.</span></div>
    <div class="dom">spindlelab.cl</div>
  </div>
</div>
</body></html>
