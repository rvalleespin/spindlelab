<!DOCTYPE html><html><head><meta charset="utf-8"><style>
@font-face { font-family:'Gabarito'; src:url('posts-agosto/Gabarito.woff2') format('woff2'); }

*{margin:0;padding:0;box-sizing:border-box}
body{width:1400px;height:880px;background:#F7F5F0;font-family:'Inter',sans-serif;padding:36px 36px 0}

.g{display:grid;grid-template-columns:repeat(4,308px);column-gap:22px;row-gap:18px}
.cell{}

.thumb img{width:308px;height:308px;object-fit:cover;display:block}
.thumb img.fit{width:auto;height:308px;object-fit:contain}
.lbl{font-size:14px;color:#131A22;font-weight:700;margin-top:9px}
.lbl span{font-weight:400;color:#5D6673}
.pt{color:#C9A227}
</style></head><body>
